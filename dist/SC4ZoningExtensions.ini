; SC4ZoningExtensions example settings
;
; Place this file next to SC4ZoningExtensions.dll in your SimCity 4 Plugins folder.
; If no INI is present, the DLL creates one automatically with built-in defaults.
;
; Supported keys in each section:
; ParcelWidth=<integer>
; ParcelHeight=<integer>
; StreetInterval=<integer>
; Network=None|Street|Road|OneWayRoad|Avenue
;
; Notes:
; - Width and height are the default parcel dimensions when you switch to that zone type.
; - StreetInterval is the default spacing used for the internal street grid when networks are enabled.
; - StreetInterval=0 uses the stock auto calculation based on parcel size.
; - Network is the default embedded road/street mode when you switch to that zone type.
; - The in-game cycle order is: None -> Street -> Road -> OneWayRoad -> Avenue
; - The in-game hotkeys are: Tab/Shift+Tab network, -/+ width, [/] height, ,/. street interval.
; - Any key may be omitted. Missing values fall back to the DLL defaults.
; - Agriculture and industrial zones usually do not surface parcel width/height meaningfully in-game,
;   so this example leaves those unset.
[ResidentialLowDensity]
ParcelWidth=2
ParcelHeight=3
StreetInterval=0
Network=Street

[ResidentialMediumDensity]
ParcelWidth=2
ParcelHeight=3
StreetInterval=0
Network=Street

[ResidentialHighDensity]
ParcelWidth=2
ParcelHeight=3
StreetInterval=0
Network=Street

[CommercialLowDensity]
ParcelWidth=2
ParcelHeight=3
StreetInterval=0
Network=Street

[CommercialMediumDensity]
ParcelWidth=2
ParcelHeight=3
StreetInterval=0
Network=Street

[CommercialHighDensity]
ParcelWidth=2
ParcelHeight=3
StreetInterval=0
Network=Street

[Agriculture]
StreetInterval=0
Network=Street

[IndustrialMediumDensity]
StreetInterval=0
Network=Street

[IndustrialHighDensity]
StreetInterval=0
Network=Street
